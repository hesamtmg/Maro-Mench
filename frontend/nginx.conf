server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router uses history mode (createWebHistory), so any path that
    # doesn't match a real file should fall back to index.html and let
    # the client-side router handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively; index.html itself is not
    # cached so deploys are picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
